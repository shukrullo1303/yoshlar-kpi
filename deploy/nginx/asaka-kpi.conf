upstream django_app {
    server unix:/run/gunicorn/asaka-kpi.sock fail_timeout=0;
}

server {
    listen 80;
    server_name asaka-kpi.uz www.asaka-kpi.uz 95.46.96.12;

    # HTTP → HTTPS (SSL tayyor bo'lganda qo'ying)
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # Django static (collectstatic chiqishi)
    location /static/ {
        alias /var/www/asaka-kpi/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media fayllar (yuklangan rasm/hujjatlar)
    location /media/ {
        alias /var/www/asaka-kpi/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django API → Gunicorn
    location /api/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # Django Admin → Gunicorn
    location /admin/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    # React frontend assets (Vite build — uzoq muddatli cache)
    location /assets/ {
        root /var/www/asaka-kpi/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — barcha qolgan so'rovlar (index.html)
    location / {
        root /var/www/asaka-kpi/frontend/dist;
        try_files $uri /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}

